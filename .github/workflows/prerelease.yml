name: Prerelease

on:
  workflow_dispatch:

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.ref || github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v6
        with:
          token: ${{ secrets.GH_DOTCOM_TOKEN }}
          node-version: 25

      - name: Bun install
        run: bun install

      - name: Run prerelease
        run: |
          bun run prerelease
