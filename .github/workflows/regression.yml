name: Speed Regression Reporter

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.ts"
      - "!src/**/*.test.ts"
  workflow_dispatch:
    inputs:
      print_only:
        description: "Only print the benchmark results to the log (do not comment on PR)"
        required: false
        type: boolean
        default: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Bun install
        run: bun install

      - name: Build current
        run: bun run prod

      - name: Run benchmark comparison
        id: bench
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "no_ts_changes=false" >> $GITHUB_OUTPUT
            bun scripts/bench.js --vign --diff HEAD --out bench_output.txt || exit 1
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            TS_CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA | grep '^src/.*\.ts$' | grep -v '\.test\.ts$' || true)

            if [ -z "$TS_CHANGES" ]; then
              echo "no_ts_changes=true" >> $GITHUB_OUTPUT
            else
              echo "no_ts_changes=false" >> $GITHUB_OUTPUT
              git fetch origin ${{ github.event.pull_request.base.ref }} || exit 1
              bun scripts/bench.js --vign --diff origin/${{ github.event.pull_request.base.ref }} --out bench_output.txt || exit 1
            fi
          fi

      - name: Print benchmark results to log
        if: ${{ inputs.print_only == true || github.event_name == 'workflow_dispatch' }}
        run: cat bench_output.txt

      - name: Comment PR
        if: ${{ github.event_name == 'pull_request' && inputs.print_only != true && steps.bench.outputs.no_ts_changes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun scripts/comment.js \
            --token $GITHUB_TOKEN \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --pr ${{ github.event.pull_request.number }} \
            --body-file bench_output.txt
